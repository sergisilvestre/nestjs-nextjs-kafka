services:

  postgres:
    image: postgres:16-alpine
    container_name: order-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: order-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"


  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: order-kafka
    depends_on:
      - zookeeper

    ports:
      - "9092:9092"

    environment:

      KAFKA_BROKER_ID: 1

      KAFKA_ZOOKEEPER_CONNECT:
        zookeeper:2181

      KAFKA_ADVERTISED_LISTENERS:
        PLAINTEXT://localhost:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1


  backend:
    build:
      context: ./backend

    container_name: order-backend

    depends_on:
      - postgres
      - kafka

    ports:
      - "3000:3000"

    environment:

      DATABASE_URL:
        postgresql://postgres:postgres@postgres:5432/orders

      JWT_SECRET:
        supersecret

      KAFKA_BROKER:
        kafka:9092

    volumes:
      - ./backend:/app
      - /app/node_modules

    command:
      npm run start:dev


  frontend:
    build:
      context: ./frontend

    container_name: order-frontend

    depends_on:
      - backend

    ports:
      - "3001:3000"

    environment:

      NEXT_PUBLIC_API_URL:
        http://localhost:3000

      NEXT_PUBLIC_WS_URL:
        http://localhost:3000

    volumes:
      - ./frontend:/app
      - /app/node_modules

    command:
      npm run dev


volumes:

  postgres_data: